<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200" width="450" height="200">

    <style>
        .text {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 14px;
        }
        .title { fill: #58a6ff; font-weight: bold; }
        .sep { fill: #8b949e; }
        .key { fill: #7ee787; font-weight: bold; }
        .val { fill: #c9d1d9; }
    </style>
    
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.0s" dur="0.5s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" values="-15 0; 0 0" begin="0.0s" dur="0.5s" fill="freeze" />
    <text x="20" y="30" class="text title">saroj@srjofficial</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.15s" dur="0.5s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" values="-15 0; 0 0" begin="0.15s" dur="0.5s" fill="freeze" />
    <text x="20" y="52" class="text sep">-----------------</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.3s" dur="0.5s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" values="-15 0; 0 0" begin="0.3s" dur="0.5s" fill="freeze" />
    <text x="20" y="74" class="text key">Now</text>
    <text x="130" y="74" class="text val">Building a dynamic automated GitHub profile</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.44999999999999996s" dur="0.5s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" values="-15 0; 0 0" begin="0.44999999999999996s" dur="0.5s" fill="freeze" />
    <text x="20" y="96" class="text key">Prev</text>
    <text x="130" y="96" class="text val">Exploring new libraries and frameworks</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.5s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" values="-15 0; 0 0" begin="0.6s" dur="0.5s" fill="freeze" />
    <text x="20" y="118" class="text key">Stack</text>
    <text x="130" y="118" class="text val">Python, SVG, Open Source Magic</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.75s" dur="0.5s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" values="-15 0; 0 0" begin="0.75s" dur="0.5s" fill="freeze" />
    <text x="20" y="140" class="text key">Highlights</text>
